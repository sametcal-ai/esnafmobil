name: flutter_app
description: A Flutter mobile application with clean architecture, Riverpod, GoRouter, and barcode scanning.
publish_to: "none"

version: 1.0.2+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.5.0 # Temel paket
  cloud_firestore: ^6.1.2 # Veritabanı için
  firebase_auth: ^6.2.0 # Giriş işlemleri için
  cloud_functions: ^6.0.7

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1
  
  crypto: ^3.0.3
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_beep:
    git:
      url: https://github.com/trietho/flutter_beep.git
      ref: master
  uuid: ^4.5.0
  pdf: ^3.11.3
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
