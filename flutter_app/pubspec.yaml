name: flutter_app
description: A Flutter mobile application with clean architecture, Riverpod, GoRouter, and barcode scanning.
publish_to: "none"

version: 1.0.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  go_router: ^14.1.4
  mobile_scanner: ^5.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_beep:
    git:
      url: https://github.com/trietho/flutter_beep.git
      ref: master
  uuid: ^4.5.0
  pdf: ^3.11.3
  share_plus: ^12.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf